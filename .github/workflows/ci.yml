name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install .NET Framework 4.8 targeting pack
        shell: pwsh
        run: |
          $url = 'https://download.microsoft.com/download/5/3/8/5380FB1A-0C9D-4B44-8A9A-0D227A9B55E6/NDP481-KB4522466-x86-x64-AllOS-ENU.exe'
          $out = Join-Path $env:TEMP 'ndp481.exe'
          Invoke-WebRequest -Uri $url -OutFile $out
          Start-Process -FilePath $out -ArgumentList '/quiet /norestart' -Wait -NoNewWindow

      - name: Build Debug x64
        shell: pwsh
        run: |
          msbuild FFmpegConverterGUI.csproj /t:Build /p:Configuration=Debug /p:Platform=x64 /property:GenerateFullPaths=true /consoleloggerparameters:NoSummary

      - name: Verify build output
        shell: pwsh
        run: |
          if (-not (Test-Path -LiteralPath 'bin/Debug/FFmpegConverterGUI.exe')) {
            throw 'Build output not found: bin/Debug/FFmpegConverterGUI.exe'
          }
