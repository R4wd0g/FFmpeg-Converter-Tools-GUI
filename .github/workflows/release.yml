name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish, for example v1.0.0'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Resolve release tag
        shell: pwsh
        run: |
          if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
            $tag = '${{ inputs.tag }}'
          }
          else {
            $tag = '${{ github.ref_name }}'
          }

          if (-not $tag) {
            throw 'Release tag could not be resolved.'
          }

          "RELEASE_TAG=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Read version from AssemblyInfo
        shell: pwsh
        run: |
          $content = Get-Content -LiteralPath 'Properties/AssemblyInfo.cs' -Raw
          if ($content -notmatch 'AssemblyInformationalVersion\("([^"]+)"\)') {
            throw 'AssemblyInformationalVersion not found in Properties/AssemblyInfo.cs'
          }

          $version = $Matches[1]
          $tagVersion = $env:RELEASE_TAG.TrimStart('v', 'V')

          if ($version -ne $tagVersion) {
            throw "Tag version '$tagVersion' does not match AssemblyInformationalVersion '$version'."
          }

          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Release x64
        shell: pwsh
        run: |
          msbuild FFmpegConverterGUI.csproj /t:Build /p:Configuration=Release /p:Platform=x64 /property:GenerateFullPaths=true /consoleloggerparameters:NoSummary

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          .\build\Prepare-Release.ps1 -Version $env:APP_VERSION -Configuration Release -Platform x64

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $sourceDir = (Resolve-Path '.\release-staging\installer').Path
          $outputDir = (Resolve-Path '.\artifacts').Path
          & iscc "/DMyAppVersion=$env:APP_VERSION" "/DSourceDir=$sourceDir" "/DOutputDir=$outputDir" ".\installer\FFmpegConverterGUI.iss"

      - name: Verify release artifacts
        shell: pwsh
        run: |
          $portable = "artifacts/FFmpeg-Converter-Tools-GUI-$env:APP_VERSION-portable.zip"
          $installer = "artifacts/FFmpeg-Converter-Tools-GUI-$env:APP_VERSION-installer.exe"

          if (-not (Test-Path -LiteralPath $portable)) {
            throw "Portable artifact not found: $portable"
          }

          if (-not (Test-Path -LiteralPath $installer)) {
            throw "Installer artifact not found: $installer"
          }

          Get-ChildItem -LiteralPath '.\artifacts' | Format-Table Name, Length -AutoSize

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.RELEASE_TAG }}
          name: FFmpeg Converter Tools GUI v${{ env.APP_VERSION }}
          artifacts: artifacts/FFmpeg-Converter-Tools-GUI-${{ env.APP_VERSION }}-portable.zip,artifacts/FFmpeg-Converter-Tools-GUI-${{ env.APP_VERSION }}-installer.exe
          allowUpdates: true
          replacesArtifacts: true
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
